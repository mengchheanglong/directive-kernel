<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directive Kernel</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface-raised: rgba(255,255,255,0.04);
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-muted: rgba(255,255,255,0.45);
    --lane-runtime: #10b981;
    --lane-architecture: #7c3aed;
    --lane-discovery: #3b82f6;
    --verified: #10b981;
    --warning: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    font-size: 14px; line-height: 1.5; min-height: 100vh;
  }
  header {
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  header h1 { font-size: 1rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }

  /* Stats */
  .pulse-bar {
    max-width: 1200px; margin: 0 auto; padding: 16px 28px 0;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  }
  .pulse-card {
    padding: 14px 16px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--surface-raised);
  }
  .pulse-value { font-size: 1.4rem; font-weight: 700; }
  .pulse-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .pulse-card.runtime .pulse-value { color: var(--lane-runtime); }
  .pulse-card.architecture .pulse-value { color: var(--lane-architecture); }
  .pulse-card.verified .pulse-value { color: var(--verified); }
  .pulse-card.discovery .pulse-value { color: var(--lane-discovery); }

  /* Readiness */
  .readiness {
    max-width: 1200px;
    margin: 0 auto 12px;
    padding: 0 28px;
  }
  .section-title {
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .readiness-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 12px;
  }
  .readiness-card {
    border: 1px solid var(--border);
    border-left: 3px solid var(--lane-discovery);
    border-radius: 8px;
    padding: 12px 14px;
    background: var(--surface-raised);
  }
  .readiness-card-title {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .readiness-card-value {
    font-size: 1.1rem;
    font-weight: 700;
  }
  .readiness-card-subtitle {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 6px;
  }
  .readiness-panels {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 12px;
  }
  .readiness-panel {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface-raised);
    padding: 12px 14px;
  }
  .panel-title {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .readiness-list {
    list-style: none;
    font-size: 0.72rem;
    color: var(--text-muted);
    display: grid;
    gap: 6px;
  }
  .readiness-list li {
    display: flex;
    flex-direction: column;
    gap: 2px;
    border-top: 1px solid var(--border);
    padding-top: 6px;
  }
  .readiness-list li:first-child { border-top: none; padding-top: 0; }
  .readiness-meta {
    color: var(--text-muted);
    font-size: 0.66rem;
  }
  .readiness-empty {
    color: var(--text-muted);
    font-size: 0.72rem;
  }

  /* Filters */
  .filter-bar {
    max-width: 1200px; margin: 0 auto; padding: 14px 28px 0;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .filter-btn {
    font-size: 0.7rem; padding: 4px 12px; border-radius: 4px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); cursor: pointer;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .filter-btn:hover, .filter-btn.active { border-color: var(--text-muted); color: var(--text); }
  .filter-btn.active { background: rgba(255,255,255,0.08); }
  .filter-count { font-size: 0.65rem; color: var(--text-muted); margin-left: auto; }

  /* Grid */
  main {
    max-width: 1200px; margin: 0 auto; padding: 20px 28px 40px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px;
  }
  .card {
    background: var(--surface-raised); border: 1px solid var(--border);
    border-radius: 8px; padding: 18px 20px;
    border-left: 3px solid var(--border); transition: border-color 150ms;
  }
  .card:hover { border-color: var(--text-muted); }
  .card.runtime { border-left-color: var(--lane-runtime); }
  .card.architecture { border-left-color: var(--lane-architecture); }
  .card.discovery { border-left-color: var(--lane-discovery); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .card-name { font-size: 0.95rem; font-weight: 600; word-break: break-word; }
  .card-badges { display: flex; gap: 6px; flex-shrink: 0; margin-left: 12px; }
  .badge {
    font-size: 0.65rem; font-weight: 600; padding: 2px 8px;
    border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap;
  }
  .badge-verified { background: rgba(16,185,129,0.15); color: var(--verified); }
  .badge-lane { background: rgba(255,255,255,0.06); color: var(--text-muted); }
  .badge-placeholder { background: rgba(245,158,11,0.12); color: var(--warning); }
  .card[data-verified="false"] { opacity: 0.55; }
  .card-desc { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; line-height: 1.4; }
  .card-meta { display: flex; gap: 16px; font-size: 0.7rem; color: var(--text-muted); border-top: 1px solid var(--border); padding-top: 10px; }
  .card-meta span { display: flex; align-items: center; gap: 4px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .dot-runtime { background: var(--lane-runtime); }
  .dot-architecture { background: var(--lane-architecture); }
  .dot-discovery { background: var(--lane-discovery); }
  .source-link { color: var(--text-muted); text-decoration: none; font-size: 0.7rem; margin-left: auto; }
  .source-link:hover { color: var(--text); }

  /* Skeleton */
  .skeleton { animation: pulse 1.8s ease-in-out infinite; border-radius: 6px; background: var(--surface-raised); }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.6} }
  .loading .card-name { height: 18px; }
  .loading .card-desc { height: 14px; width: 80%; }
  .loading .card-meta { height: 12px; width: 60%; }
  .skeleton-pulse { height: 28px; margin-bottom: 6px; }
  .skeleton-pulse-sm { height: 14px; width: 60%; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
</style>
</head>
<body>
<header>
  <h1>Directive Kernel</h1>
</header>

<div class="pulse-bar" id="pulse">
  <div class="pulse-card discovery"><span class="skeleton skeleton-pulse"></span><div class="pulse-label">Sources</div></div>
  <div class="pulse-card runtime"><span class="skeleton skeleton-pulse"></span><div class="pulse-label">Runtime</div></div>
  <div class="pulse-card architecture"><span class="skeleton skeleton-pulse"></span><div class="pulse-label">Architecture</div></div>
  <div class="pulse-card verified"><span class="skeleton skeleton-pulse"></span><div class="pulse-label">Verified</div></div>
</div>

<section class="readiness" id="readiness">
  <h2 class="section-title">Jarvis readiness</h2>
  <div class="readiness-grid" id="readinessCards">
    <div class="readiness-card"><span class="skeleton skeleton-pulse"></span><span class="skeleton-pulse-sm"></span></div>
    <div class="readiness-card"><span class="skeleton skeleton-pulse"></span><span class="skeleton-pulse-sm"></span></div>
    <div class="readiness-card"><span class="skeleton skeleton-pulse"></span><span class="skeleton-pulse-sm"></span></div>
    <div class="readiness-card"><span class="skeleton skeleton-pulse"></span><span class="skeleton-pulse-sm"></span></div>
    <div class="readiness-card"><span class="skeleton skeleton-pulse"></span><span class="skeleton-pulse-sm"></span></div>
  </div>
  <div class="readiness-panels" id="readinessPanels">
    <div class="readiness-panel"><div class="panel-title">Top 5 recent capability failures</div><div class="readiness-empty">Loading...</div></div>
    <div class="readiness-panel"><div class="panel-title">Open capability gaps</div><div class="readiness-empty">Loading...</div></div>
    <div class="readiness-panel"><div class="panel-title">Source decisions by class</div><div class="readiness-empty">Loading...</div></div>
  </div>
</section>

<div class="filter-bar" id="filters">
  <button class="filter-btn" data-filter="all">All</button>
  <button class="filter-btn" data-filter="runtime">Runtime</button>
  <button class="filter-btn" data-filter="architecture">Architecture</button>
  <button class="filter-btn active" data-filter="verified">Verified</button>
  <span class="filter-count" id="filterCount"></span>
</div>

<main id="grid"></main>

<script>
const SNAPSHOT_ENDPOINTS = [
  '/api/snapshot',
  '/snapshot.json',
];
const DESC_URL = '/source-descriptions.json';

let descriptionsSnapshot = {};
let verifiedListRef = [];
let defaultDescription = '';

async function load() {
  const grid = document.getElementById('grid');
  const pulse = document.getElementById('pulse');
  const count = document.getElementById('filterCount');
  const readinessCards = document.getElementById('readinessCards');
  const readinessPanels = document.getElementById('readinessPanels');

  count.textContent = '';

  grid.className = 'loading';
  grid.innerHTML = Array(8).fill(0).map(() =>
    '<div class="card"><div class="card-name skeleton"></div><div class="card-desc skeleton"></div><div class="card-meta skeleton"></div></div>'
  ).join('');
  readinessCards.innerHTML = Array(5).fill(0).map(() =>
    '<div class="readiness-card"><span class="skeleton skeleton-pulse"></span><span class="skeleton-pulse-sm"></span></div>'
  ).join('');
  readinessPanels.innerHTML = `
    <div class="readiness-panel"><div class="panel-title">Top 5 recent capability failures</div><div class="readiness-empty">Loading...</div></div>
    <div class="readiness-panel"><div class="panel-title">Open capability gaps</div><div class="readiness-empty">Loading...</div></div>
    <div class="readiness-panel"><div class="panel-title">Source decisions by class</div><div class="readiness-empty">Loading...</div></div>
  `;

  try {
    const [data, descData] = await Promise.all([fetchSnapshot(), loadSourceDescriptions()]);
    normalizeReadinessState(descData);

    const descriptions = descriptionsSnapshot;
    const verifiedList = verifiedListRef;

    const entries = data.queue?.entries || [];
    const runtime = entries.filter(e => e.routing_target === 'runtime').length;
    const arch = entries.filter(e => e.routing_target === 'architecture').length;
    const verifiedCandidates = data?.jarvisReadiness?.capabilityProjection?.verifiedProjectionReady ??
      verifiedList.length;

    // Pulse
    pulse.innerHTML = `
      <div class="pulse-card discovery"><div class="pulse-value">${entries.length}</div><div class="pulse-label">Sources</div></div>
      <div class="pulse-card runtime"><div class="pulse-value">${runtime}</div><div class="pulse-label">Runtime</div></div>
      <div class="pulse-card architecture"><div class="pulse-value">${arch}</div><div class="pulse-label">Architecture</div></div>
      <div class="pulse-card verified"><div class="pulse-value">${verifiedCandidates}</div><div class="pulse-label">Verified</div></div>`;

    renderReadiness({
      jarvisReadiness: data.jarvisReadiness,
      queueEntries: entries,
    });

    grid.className = '';
    if (!entries.length) {
      grid.innerHTML = '<div class="empty">No sources ingested yet. Run the pipeline to add one.</div>';
      count.textContent = '0 sources';
      return;
    }

    function findDesc(name, cid) {
      const n = (name + ' ' + cid).toLowerCase();
      for (const [k, d] of Object.entries(descriptions)) {
        if (n.includes(k)) {
          return d;
        }
      }
      return defaultDescription || '';
    }

    function isVerifiedEntry(e) {
      const name = e.candidate_name || e.candidate_id || 'Unknown';
      const cid = e.candidate_id || '';
      const normalized = (name + ' ' + cid).toLowerCase();
      return verifiedList.some(k => normalized.includes(k));
    }

    // Verified-first: demote unverified capabilities below verified ones.
    const sortedEntries = entries.slice().sort(
      (a, b) => Number(isVerifiedEntry(b)) - Number(isVerifiedEntry(a)),
    );

    grid.innerHTML = sortedEntries.map(e => {
      const lane = e.routing_target || 'discovery';
      const name = e.candidate_name || e.candidate_id || 'Unknown';
      const desc = findDesc(name, e.candidate_id || '');
      const url = e.source_reference || '';
      const isVerified = isVerifiedEntry(e);

      return `<div class="card ${lane}" data-lane="${lane}" data-verified="${isVerified}">
        <div class="card-header">
          <span class="card-name">${esc(name)}</span>
          <div class="card-badges">
            ${isVerified ? '<span class="badge badge-verified">verified</span>' : '<span class="badge badge-placeholder">placeholder</span>'}
            <span class="badge badge-lane">${lane}</span>
          </div>
        </div>
        <div class="card-desc">${esc(desc)}</div>
        <div class="card-meta">
          <span><span class="dot dot-${lane}"></span>${lane}</span>
          ${url && url.startsWith('http') ? `<a href="${esc(url)}" target="_blank" class="source-link">↳ source</a>` : ''}
        </div>
      </div>`;
    }).join('');

    const activeFilter = document.querySelector('.filter-btn.active');
    applyFilter(activeFilter ? activeFilter.dataset.filter : 'verified');
  } catch (err) {
    grid.className = '';
    grid.innerHTML = `<div class="empty">Failed to load: ${esc(err.message)}</div>`;
    renderReadiness({ jarvisReadiness: null, queueEntries: [] });
  }
}

function renderReadiness({ jarvisReadiness, queueEntries }) {
  const projection = jarvisReadiness?.capabilityProjection;
  const failures = jarvisReadiness?.topRecentCapabilityFailures || [];
  const openGaps = jarvisReadiness?.openCapabilityGaps || null;
  const decisionClasses = jarvisReadiness?.sourceDecisionsByClass || [];
  const architecturePending = jarvisReadiness?.architectureExperimentsPendingEvaluation ??
    countArchitecturePendingFromQueue(queueEntries);
  const totalProjections = projection?.total ?? null;

  document.getElementById('readinessCards').innerHTML = `
    <div class="readiness-card">
      <div class="readiness-card-title">Verified Projection-Ready</div>
      <div class="readiness-card-value">${numberOrDash(projection?.verifiedProjectionReady)}</div>
      <div class="readiness-card-subtitle">Projection-ready verified capabilities${totalProjections != null ? ` of ${numberOrDash(totalProjections)} total` : ''}</div>
    </div>
    <div class="readiness-card">
      <div class="readiness-card-title">Verified Missing Projection</div>
      <div class="readiness-card-value">${numberOrDash(projection?.verifiedMissingProjection)}</div>
      <div class="readiness-card-subtitle">Verified entries without projection</div>
    </div>
    <div class="readiness-card">
      <div class="readiness-card-title">Claimed</div>
      <div class="readiness-card-value">${numberOrDash(projection?.claimed)}</div>
      <div class="readiness-card-subtitle">Candidate-capability entries</div>
    </div>
    <div class="readiness-card">
      <div class="readiness-card-title">Placeholder / Note / Rejected</div>
      <div class="readiness-card-value">${numberOrDash(projection?.placeholder)}</div>
      <div class="readiness-card-subtitle">Unverified capability metadata classes</div>
    </div>
    <div class="readiness-card">
      <div class="readiness-card-title">Architecture Pending Evaluation</div>
      <div class="readiness-card-value">${numberOrDash(architecturePending)}</div>
      <div class="readiness-card-subtitle">Architecture entries still open</div>
    </div>
  `;

  const panelNodes = Array.from(document.getElementById('readinessPanels').querySelectorAll('.readiness-panel'));

  if (panelNodes[0]) {
    if (failures.length) {
      const failureItems = failures.map(item => {
        const rationale = truncateText(item.rationale || '', 140);
        return `<li><span>${esc(item.candidateId || 'unknown')} <span class="readiness-meta">(${esc(item.outcome)}) ${esc(formatTimestamp(item.recordedAt))}</span></span><span class="readiness-meta">${esc(rationale)}</span></li>`;
      });
      panelNodes[0].innerHTML = `<div class="panel-title">Top 5 recent capability failures</div><ul class="readiness-list">${failureItems.join('')}</ul>`;
    } else {
      panelNodes[0].innerHTML = '<div class="panel-title">Top 5 recent capability failures</div><div class="readiness-empty">No recent capability failures found.</div>';
    }
  }

  if (panelNodes[1]) {
    if (openGaps) {
      const examples = openGaps.examples || [];
      const exampleItems = examples.map((item) => `<li><span>${esc(item)}</span></li>`);
      panelNodes[1].innerHTML = `<div class="panel-title">Open capability gaps</div><div class="readiness-meta">Open gaps: ${numberOrDash(openGaps.total)}</div>${exampleItems.length ? `<ul class="readiness-list">${exampleItems.join('')}</ul>` : '<div class="readiness-empty">No open capability gaps reported.</div>'}`;
    } else {
      panelNodes[1].innerHTML = '<div class="panel-title">Open capability gaps</div><div class="readiness-empty">No open capability gap data available.</div>';
    }
  }

  if (panelNodes[2]) {
    if (decisionClasses.length) {
      const decisionItems = decisionClasses.map((row) =>
        `<li><span>${esc(row.decisionClass || 'unknown')}</span><span class="readiness-meta">${row.count}</span></li>`,
      );
      panelNodes[2].innerHTML = `<div class="panel-title">Source decisions by class</div><ul class="readiness-list">${decisionItems.join('')}</ul>`;
    } else {
      panelNodes[2].innerHTML = '<div class="panel-title">Source decisions by class</div><div class="readiness-empty">No source decision data available.</div>';
    }
  }
}

function numberOrDash(value) {
  return typeof value === 'number' && Number.isFinite(value) ? value : '—';
}

function normalizeReadinessState(data) {
  descriptionsSnapshot = data.descriptions || {};
  verifiedListRef = data.verified || [];
  defaultDescription = data.default || '';
}

function formatTimestamp(value) {
  if (!value) return '';
  const parsed = new Date(value);
  if (Number.isNaN(parsed.valueOf())) return value;
  return parsed.toLocaleString();
}

function truncateText(value, maxLength) {
  const text = String(value || '');
  if (text.length <= maxLength) return text;
  return `${text.slice(0, maxLength)}…`;
}

function countArchitecturePendingFromQueue(entries) {
  return (entries || []).filter(entry => {
    const lane = String(entry?.routing_target || '').toLowerCase();
    const status = String(entry?.status_effective || '').toLowerCase();
    return lane === 'architecture' && !status.includes('completed');
  }).length;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function applyFilter(filter) {
  document.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.filter === filter));
  let visible = 0;
  document.querySelectorAll('#grid .card').forEach(card => {
    if (filter === 'all') { card.style.display = ''; visible++; return; }
    if (filter === 'verified') {
      if (card.dataset.verified === 'true') { card.style.display = ''; visible++; }
      else card.style.display = 'none';
      return;
    }
    if (card.dataset.lane === filter) { card.style.display = ''; visible++; }
    else card.style.display = 'none';
  });
  document.getElementById('filterCount').textContent = `${visible} sources`;
}

async function fetchSnapshot() {
  let lastErr = null;
  for (const endpoint of SNAPSHOT_ENDPOINTS) {
    try {
      const res = await fetch(endpoint, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Failed to fetch ${endpoint}: ${res.status}`);
      return await res.json();
    } catch (error) {
      lastErr = error;
    }
  }
  throw lastErr || new Error('No snapshot source could be reached');
}

async function loadSourceDescriptions() {
  try {
    const descRes = await fetch(DESC_URL, { cache: 'no-store' });
    if (!descRes.ok) throw new Error(`Failed to fetch ${DESC_URL}: ${descRes.status}`);
    return await descRes.json();
  } catch {
    return {
      descriptions: {},
      verified: [],
      default: '',
    };
  }
}

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  applyFilter(e.target.dataset.filter);
});

load();
</script>
</body>
</html>
